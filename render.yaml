services:
  - type: web
    name: fashion-cnn-api
    runtime: python
    buildCommand: cd fashion/frontend && npm install && npm run build && cd ../.. && pip install -r fashion/requirements.txt
    startCommand: cd fashion && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 18.17.0
    healthCheckPath: /stats
