services:
  - type: web
    name: fashion-cnn-api
    runtime: python
    buildCommand: >
      pip install -r fashion/requirements.txt &&
      cd fashion/frontend &&
      npm install &&
      npm run build
    startCommand: cd fashion && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.11.0
    healthCheckPath: /stats
